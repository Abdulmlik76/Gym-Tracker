<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM">
<meta name="theme-color" content="#0a0a0f">
<title>GYM — عبدالملك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--card:#1e1e28;--border:#2c2c3e;
  --acc:#f5a623;--acc2:#e8503a;--acc3:#4ecdc4;--text:#eeeef5;--muted:#6b6b8a;
  --green:#2ecc71;--red:#e74c3c;
  --top:env(safe-area-inset-top,44px);
  --bot:env(safe-area-inset-bottom,34px);
  --left:env(safe-area-inset-left,0px);
  --right:env(safe-area-inset-right,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;padding-top:var(--top)}
.view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;padding-bottom:calc(var(--bot) + 70px)}
.view.active{display:flex}

/* ── LOADING SCREEN ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loading-screen.hide{opacity:0;pointer-events:none}
.loader-icon{font-size:48px;margin-bottom:16px;animation:pulse 1.2s infinite}
.loader-text{font-size:14px;color:var(--muted);font-weight:600}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── NAV BAR — iPhone 16 Pro safe ── */
nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  background:rgba(10,10,15,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding-bottom:var(--bot);
  z-index:200;
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 6px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Cairo',sans-serif;transition:color .2s}
.nav-btn.active{color:var(--acc)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-weight:700;letter-spacing:.3px}

/* ── PAGE HEADER ── */
.page-header{padding:20px 20px 12px;flex-shrink:0}
.page-header h1{font-size:24px;font-weight:900}
.page-header p{font-size:12px;color:var(--muted);margin-top:2px}

/* ══════════ HOME ══════════ */
#home{background:var(--bg)}
.home-hero{padding:20px 20px 16px;background:linear-gradient(180deg,rgba(245,166,35,.07) 0%,transparent 100%);flex-shrink:0}
.greeting{font-size:13px;color:var(--muted)}
.hero-name{font-size:26px;font-weight:900;margin-top:2px}
.hero-name span{color:var(--acc)}
.hero-date{font-size:12px;color:var(--muted);margin-top:3px}

.week-toggle{display:flex;gap:8px;padding:0 20px 14px;flex-shrink:0}
.wtab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .2s}
.wtab.w1{background:rgba(58,107,199,.15);border-color:#3a6bc7;color:#7ca3e8}
.wtab.w2{background:rgba(199,80,58,.15);border-color:#c7503a;color:#e87c6a}
.wtab:not(.active){opacity:.45}
.wtab.active{opacity:1;transform:scale(1.02)}

.days-scroll{flex:1;overflow-y:auto;padding:0 20px 8px;display:flex;flex-direction:column;gap:10px}

.day-tile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .15s}
.day-tile:active{transform:scale(.98);opacity:.8}
.day-tile.rest-tile{opacity:.45;cursor:default}
.day-tile-top{display:flex;align-items:center;gap:12px}
.day-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
.badge-w1{background:rgba(58,107,199,.25);color:#7ca3e8}
.badge-w2{background:rgba(199,80,58,.25);color:#e87c6a}
.badge-rest{background:rgba(107,107,138,.15);color:var(--muted)}
.day-info{flex:1}
.day-name{font-weight:700;font-size:15px}
.day-focus{font-size:12px;color:var(--muted);margin-top:1px}
.day-done-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(46,204,113,.15);color:var(--green);font-weight:700;flex-shrink:0}
.muscle-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600}
.ch-chest{background:rgba(231,76,60,.2);color:#e74c3c}
.ch-back{background:rgba(52,152,219,.2);color:#3498db}
.ch-shoulder{background:rgba(155,89,182,.2);color:#9b59b6}
.ch-tricep{background:rgba(230,126,34,.2);color:#e67e22}
.ch-bicep{background:rgba(46,204,113,.2);color:#2ecc71}
.ch-leg{background:rgba(241,196,15,.2);color:#f1c40f}
.ch-core{background:rgba(26,188,156,.2);color:#1abc9c}
.ch-glute{background:rgba(231,76,60,.2);color:#e07060}

/* ══════════ WORKOUT VIEW ══════════ */
#workout{background:var(--bg)}
.workout-header{padding:16px 20px 12px;display:flex;align-items:flex-start;gap:12px;flex-shrink:0;background:linear-gradient(180deg,var(--s1) 0%,transparent 100%)}
.back-btn{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{width:18px;height:18px}
.workout-header-text{flex:1}
.workout-header h2{font-size:18px;font-weight:900;line-height:1.2}
.workout-header p{font-size:12px;color:var(--muted);margin-top:2px}

.exercises-list{flex:0 0 auto;overflow:visible;padding:0 16px 100px;display:flex;flex-direction:column;gap:10px}

/* Exercise card */
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.exercise-card.open{overflow:visible}
.ex-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px}
.ex-header-left{flex:1;min-width:0}
.ex-title{font-weight:700;font-size:14px;line-height:1.3}
.ex-muscle{font-size:11px;color:var(--muted);margin-top:2px}
.ex-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ex-target{font-size:11px;color:var(--acc);font-weight:700;text-align:left}
.ex-status{width:22px;height:22px;border-radius:50%;background:rgba(46,204,113,.15);border:1.5px solid rgba(46,204,113,.3);display:flex;align-items:center;justify-content:center;display:none}
.ex-status.show{display:flex}
.ex-status svg{width:12px;height:12px;color:var(--green)}
.ex-expand{color:var(--muted);font-size:14px;transition:transform .3s}
.exercise-card.open .ex-expand{transform:rotate(180deg)}

.ex-body{display:none;padding:0 14px 14px}
.exercise-card.open .ex-body{display:block}

/* Last session banner */
.last-banner{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.15);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.last-banner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.last-banner-label{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.last-banner-date{font-size:10px;color:var(--muted)}
.last-banner-sets{display:flex;flex-wrap:wrap;gap:5px}
.last-pill{font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(245,166,35,.12);color:var(--acc);font-weight:600;cursor:pointer;border:1px solid rgba(245,166,35,.2);transition:all .15s}
.last-pill:active{background:rgba(245,166,35,.25)}
.use-last-btn{width:100%;padding:8px;border-radius:8px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--acc);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.use-last-btn:active{background:rgba(245,166,35,.2)}

/* Sets */
.sets-header{display:flex;margin-bottom:8px;padding:0 4px}
.sets-header span{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sets-header .sh-set{width:32px}
.sets-header .sh-w{flex:1;text-align:center}
.sets-header .sh-r{flex:1;text-align:center}
.sets-header .sh-done{width:44px}

.sets-logger{display:flex;flex-direction:column;gap:7px}
.set-row{display:flex;align-items:center;gap:6px}
.set-num{width:28px;height:28px;border-radius:7px;background:rgba(245,166,35,.1);color:var(--acc);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-input-group{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.set-input{background:var(--s1);border:1.5px solid var(--border);border-radius:9px;padding:10px 6px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;width:100%;text-align:center;-webkit-appearance:none;transition:border-color .2s}
.set-input:focus{border-color:var(--acc);outline:none;background:rgba(245,166,35,.04)}
.set-input::placeholder{color:var(--muted);font-size:11px;font-weight:400}
.set-done-btn{width:44px;height:44px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.set-done-btn svg{width:16px;height:16px}

.sets-actions{display:flex;gap:8px;margin-top:12px}
.add-set-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border:1.5px dashed var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s}
.add-set-btn:active{border-color:var(--acc);color:var(--acc)}

/* FLOATING SAVE BAR — fixed at bottom when exercise is open */
.floating-save-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px;padding-bottom:calc(var(--bot) + 70px);
  background:linear-gradient(0deg, rgba(10,10,15,1) 70%, rgba(10,10,15,0) 100%);
  z-index:150;display:none;
  gap:10px;
}
.floating-save-bar.visible{display:flex}
.floating-save-btn{
  flex:2;padding:15px;border-radius:12px;
  background:linear-gradient(135deg,var(--acc),#e0941a);
  border:none;color:#000;font-family:'Cairo',sans-serif;
  font-size:15px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 20px rgba(245,166,35,.4);
  transition:all .2s;
  min-height:52px;
}
.floating-save-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(245,166,35,.2)}
.floating-add-btn{
  flex:1;padding:15px;border-radius:12px;
  border:1.5px dashed var(--border);background:rgba(30,30,40,.9);
  color:var(--muted);font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  min-height:52px;transition:all .2s;
}
.floating-add-btn:active{border-color:var(--acc);color:var(--acc)}

/* inline save button hidden (replaced by floating) */
.save-ex-btn{display:none}

/* ══════════ PROGRESS VIEW ══════════ */
#progress-view{background:var(--bg)}
.prog-tabs{display:flex;gap:8px;padding:0 20px 14px;flex-shrink:0}
.ptab{flex:1;padding:9px;text-align:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--card);transition:all .2s}
.ptab.active{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}

.prog-search{padding:0 20px 12px;flex-shrink:0}
.search-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;-webkit-appearance:none}
.search-input:focus{border-color:var(--acc);outline:none}
.search-input::placeholder{color:var(--muted)}

.prog-list{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:12px}

/* Charts tab */
.charts-container{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:14px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;overflow:hidden}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.chart-ex-name{font-weight:700;font-size:14px}
.chart-pr-badge{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(245,166,35,.15);color:var(--acc);font-weight:700}
.chart-muscle{font-size:11px;color:var(--muted);margin-bottom:12px}
.chart-wrap{position:relative;height:160px}

/* Volume chart */
.volume-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;overflow:hidden}
.volume-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.volume-title{font-weight:700;font-size:14px}
.volume-badge{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(78,205,196,.15);color:var(--acc3);font-weight:700}
.volume-wrap{position:relative;height:180px}

/* History cards */
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.prog-card-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.prog-ex-name{font-weight:700;font-size:14px}
.prog-sessions{font-size:11px;color:var(--muted);margin-top:2px}
.prog-best-val{font-size:20px;font-weight:900;color:var(--acc);text-align:left}
.prog-best-label{font-size:10px;color:var(--muted);text-align:left}
.prog-history{display:none;padding:0 16px 14px}
.prog-card.open .prog-history{display:block}
.hist-date{font-size:11px;color:var(--muted);width:70px;flex-shrink:0;padding-top:3px}
.hist-sets{flex:1;display:flex;flex-wrap:wrap;gap:5px}
.hist-pr{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.4);color:var(--acc)}

/* ══════════ STATS ══════════ */
#stats{background:var(--bg)}
.stats-grid{padding:0 16px 16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-card-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini-stat{background:var(--s2);border-radius:10px;padding:12px;text-align:center}
.mini-val{font-size:24px;font-weight:900;color:var(--text)}
.mini-label{font-size:11px;color:var(--muted);margin-top:2px}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.pr-row:last-child{border-bottom:none}
.pr-ex{font-size:13px;font-weight:600}
.pr-val{font-size:13px;color:var(--acc);font-weight:700}
.pr-date{font-size:10px;color:var(--muted);text-align:left}

/* Muscle volume summary */
.muscle-volume-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mv-item{background:var(--s2);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:4px}
.mv-name{font-size:11px;color:var(--muted);font-weight:600}
.mv-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
.mv-fill{height:100%;border-radius:2px;transition:width .6s}
.mv-val{font-size:13px;font-weight:900}

/* ══════════ DELETE / EDIT HISTORY ══════════ */
.hist-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);position:relative}
.hist-row:last-child{border-bottom:none}
.hist-delete-session{
  width:30px;height:30px;border-radius:8px;border:1px solid rgba(231,76,60,.2);
  background:rgba(231,76,60,.08);color:var(--red);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all .2s;margin-top:1px;
}
.hist-delete-session:active{background:rgba(231,76,60,.25);transform:scale(.92)}
.hist-delete-session svg{width:14px;height:14px}
.hist-set-pill{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;position:relative;cursor:pointer;transition:all .15s}
.hist-set-pill .pill-delete{
  display:none;position:absolute;top:-6px;right:-6px;
  width:16px;height:16px;border-radius:50%;
  background:var(--red);color:#fff;font-size:9px;font-weight:900;
  align-items:center;justify-content:center;line-height:1;
  box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;z-index:2;
}
.hist-set-pill.edit-mode .pill-delete{display:flex}
.hist-set-pill.edit-mode{border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.06)}
.prog-edit-toggle{
  font-size:10px;padding:4px 10px;border-radius:8px;
  background:rgba(107,107,138,.1);border:1px solid var(--border);
  color:var(--muted);font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.prog-edit-toggle.active{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.08)}
.prog-edit-toggle:active{transform:scale(.95)}

/* Confirm modal */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:20px;
}
.confirm-overlay.show{display:flex}
.confirm-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;max-width:320px;width:100%;text-align:center;
  animation:modalIn .2s ease-out;
}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:900;margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{
  flex:1;padding:12px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
}
.confirm-cancel:active{opacity:.7}
.confirm-delete{
  flex:1;padding:12px;border-radius:10px;
  background:var(--red);border:none;
  color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 12px rgba(231,76,60,.3);
}
.confirm-delete:active{opacity:.7;transform:scale(.97)}

/* ══════════ TOAST ══════════ */
.toast{position:fixed;bottom:calc(72px + var(--bot) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════ EMPTY ══════════ */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.7}

::-webkit-scrollbar{display:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ══════════ iPhone 16 Pro specific ══════════ */
@supports(padding: max(0px)){
  nav{padding-bottom:max(var(--bot), 20px)}
  .view{padding-bottom:calc(max(var(--bot), 20px) + 70px)}
}
@media screen and (max-width:393px){
  .set-input{padding:9px 4px;font-size:14px}
  .set-done-btn{width:40px;height:40px}
  .ex-title{font-size:13px}

// ════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════
let currentWeek = 1;
let logs = {};
let activeCharts = {};
let progTab = 'history';
let storageAvailable = false;

// Try persistent storage first, fall back to in-memory
async function initStorage() {
  try {
    if (window.storage) {
      storageAvailable = true;
      const result = await window.storage.get('gym_logs_v2');
      if (result && result.value) {
        logs = JSON.parse(result.value);
      }
    }
  } catch (e) {
    console.log('Storage init:', e);
    // Try localStorage as fallback
    try {
      const local = localStorage.getItem('gym_logs_v2');
      if (local) logs = JSON.parse(local);
    } catch (e2) { /* in-memory only */ }
  }
  // Hide loading, render
  document.getElementById('loading-screen').classList.add('hide');
  setTimeout(function(){ document.getElementById('loading-screen').style.display='none'; }, 500);
  renderHome();
}

async function saveLogs() {
  try {
    if (storageAvailable && window.storage) {
      await window.storage.set('gym_logs_v2', JSON.stringify(logs));
    }
  } catch (e) {
    console.log('Save error:', e);
  }
  // Also try localStorage
  try { localStorage.setItem('gym_logs_v2', JSON.stringify(logs)); } catch(e){}
}

// ════════════════════════════════
// UTILS
// ════════════════════════════════
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){
  var parts = d.split('-');
  var y = parts[0], m = parts[1], day = parts[2];
  var months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  return parseInt(day) + ' ' + months[parseInt(m)-1];
}
function bestSet(sets){
  if(!sets || !sets.length) return null;
  return sets.reduce(function(b,s){ return (s.w*s.r)>(b.w*b.r)?s:b; }, sets[0]);
}
function allExercises(){
  var map = {};
  [1,2].forEach(function(w){ WEEKS[w].forEach(function(d){ d.exercises.forEach(function(e){ map[e.id]=e; }); }); });
  return map;
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
function getLastSession(exId){
  var sessions = (logs[exId]||[]).filter(function(s){ return s.date !== today(); });
  if(!sessions.length) return null;
  return sessions[sessions.length-1];
}
var DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

// ════════════════════════════════
// HOME
// ════════════════════════════════
function setWeek(w){
  currentWeek = w;
  document.querySelectorAll('.wtab').forEach(function(t,i){ t.classList.toggle('active', i+1===w); });
  renderHome();
}
function renderHome(){
  var h = new Date().getHours();
  document.getElementById('greeting').textContent = h<12?'صباح الخير،':h<17?'مساء النهار،':h<21?'مساء الخير،':'مساء النور،';
  var now = new Date();
  document.getElementById('hero-date').textContent = DAYS_AR[now.getDay()] + ' • ' + now.getDate()+'/'+( now.getMonth()+1)+'/'+now.getFullYear();
  var c = document.getElementById('days-container');
  c.innerHTML = '';
  WEEKS[currentWeek].forEach(function(day, idx){
    var tile = document.createElement('div');
    tile.className = 'day-tile' + (day.rest?' rest-tile':'');
    var done = day.rest ? 0 : day.exercises.filter(function(e){ return (logs[e.id]||[]).some(function(s){ return s.date===today(); }); }).length;
    tile.innerHTML =
      '<div class="day-tile-top">' +
        '<div class="day-badge '+(day.rest?'badge-rest':(currentWeek===1?'badge-w1':'badge-w2'))+'">'+(idx+1)+'</div>' +
        '<div class="day-info">' +
          '<div class="day-name">'+day.day+'</div>' +
          '<div class="day-focus">'+day.focus+'</div>' +
        '</div>' +
        (done>0?'<div class="day-done-badge">✓ '+done+'/'+day.exercises.length+'</div>':'') +
      '</div>' +
      (day.chips.length?'<div class="muscle-chips">'+day.chips.map(function(ch,i){ return '<span class="chip '+ch+'">'+day.labels[i]+'</span>'; }).join('')+'</div>':'');
    if(!day.rest){
      (function(w,di){ tile.onclick = function(){ openWorkout(w,di); }; })(currentWeek, idx);
    }
    c.appendChild(tile);
  });
}

// ════════════════════════════════
// WORKOUT
// ════════════════════════════════
function openWorkout(week, dayIdx){
  var day = WEEKS[week][dayIdx];
  document.getElementById('workout-title').textContent = day.day+' — '+day.focus;
  document.getElementById('workout-subtitle').textContent = day.exercises.length+' تمارين';
  var c = document.getElementById('exercises-container');
  c.innerHTML = '';
  day.exercises.forEach(function(ex){ c.appendChild(buildExCard(ex)); });
  switchView('workout', null);
}

function buildExCard(ex){
  var card = document.createElement('div');
  card.className = 'exercise-card';
  card.id = 'card-'+ex.id;

  var last = getLastSession(ex.id);
  var todayLog = (logs[ex.id]||[]).find(function(s){ return s.date===today(); });

  // Sets: today's log OR last session's sets (memory!) OR 3 empty
  var initSets;
  if(todayLog){
    initSets = todayLog.sets.map(function(s){ return {w:s.w, r:s.r, done:s.done}; });
  } else if(last){
    initSets = last.sets.map(function(s){ return {w:s.w, r:s.r, done:false}; });
  } else {
    initSets = [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}];
  }

  // Last session banner
  var lastHtml = '';
  if(last){
    lastHtml = '<div class="last-banner">' +
      '<div class="last-banner-top">' +
        '<div class="last-banner-label">⏱ آخر جلسة</div>' +
        '<div class="last-banner-date">'+fmtDate(last.date)+'</div>' +
      '</div>' +
      '<div class="last-banner-sets">' +
        last.sets.map(function(s,i){ return '<span class="last-pill" onclick="fillSet(\''+ex.id+'\','+i+','+s.w+','+s.r+')">'+s.w+'كج × '+s.r+'</span>'; }).join('') +
      '</div>' +
      (!todayLog ? '<button class="use-last-btn" onclick="useLastSession(\''+ex.id+'\')">↩ استخدم نفس الأوزان</button>':'') +
    '</div>';
  }

  card.innerHTML =
    '<div class="ex-header" onclick="toggleEx(this)">' +
      '<div class="ex-header-left">' +
        '<div class="ex-title">'+ex.name+'</div>' +
        '<div class="ex-muscle">'+ex.muscle+'</div>' +
      '</div>' +
      '<div class="ex-header-right">' +
        '<div class="ex-target">'+ex.target+'</div>' +
        '<div class="ex-status '+(todayLog?'show':'')+'" id="status-'+ex.id+'">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
        '</div>' +
        '<div class="ex-expand">▾</div>' +
      '</div>' +
    '</div>' +
    '<div class="ex-body">' +
      lastHtml +
      '<div class="sets-header">' +
        '<span class="sh-set">ست</span>' +
        '<span class="sh-w" style="flex:1;text-align:center">الوزن (كج)</span>' +
        '<span class="sh-r" style="flex:1;text-align:center">التكرار</span>' +
        '<span class="sh-done" style="width:44px"></span>' +
      '</div>' +
      '<div class="sets-logger" id="sets-'+ex.id+'"></div>' +
      '<div class="sets-actions">' +
        '<button class="add-set-btn" onclick="addSet(\''+ex.id+'\')">+ ست</button>' +
        '<button class="save-ex-btn" onclick="saveExercise(\''+ex.id+'\')">💾 حفظ</button>' +
      '</div>' +
    '</div>';

  var setsC = card.querySelector('#sets-'+ex.id);
  initSets.forEach(function(s,i){ appendSetRow(setsC, ex.id, i, s); });

  return card;
}

function appendSetRow(container, exId, idx, data){
  var row = document.createElement('div');
  row.className = 'set-row';
  row.id = 'set-'+exId+'-'+idx;
  row.innerHTML =
    '<div class="set-num">'+(idx+1)+'</div>' +
    '<div class="set-input-group">' +
      '<input class="set-input" type="number" inputmode="decimal" placeholder="كج" value="'+(data.w||'')+'" id="w-'+exId+'-'+idx+'">' +
      '<input class="set-input" type="number" inputmode="numeric" placeholder="تكرار" value="'+(data.r||'')+'" id="r-'+exId+'-'+idx+'">' +
    '</div>' +
    '<button class="set-done-btn '+(data.done?'done':'')+'" onclick="toggleSetDone(this)" id="done-'+exId+'-'+idx+'">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
    '</button>';
  container.appendChild(row);
}

var activeExId = null;

function toggleEx(header){
  var card = header.closest('.exercise-card');
  var wasOpen = card.classList.contains('open');
  // Close all other cards
  document.querySelectorAll('.exercise-card.open').forEach(function(c){
    if(c !== card) c.classList.remove('open');
  });
  card.classList.toggle('open');
  var bar = document.getElementById('floating-save-bar');
  if(!wasOpen){
    // Opening this card
    var exId = card.id.replace('card-','');
    activeExId = exId;
    bar.classList.add('visible');
    // Scroll card into view
    setTimeout(function(){ card.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
  } else {
    // Closing
    activeExId = null;
    bar.classList.remove('visible');
  }
}

function floatingSave(){
  if(activeExId) saveExercise(activeExId);
}
function floatingAddSet(){
  if(activeExId) addSet(activeExId);
}

function toggleSetDone(btn){ btn.classList.toggle('done'); }

function fillSet(exId, idx, w, r){
  var wEl = document.getElementById('w-'+exId+'-'+idx);
  var rEl = document.getElementById('r-'+exId+'-'+idx);
  if(wEl) wEl.value = w;
  if(rEl) rEl.value = r;
}

function useLastSession(exId){
  var last = getLastSession(exId);
  if(!last) return;
  var c = document.getElementById('sets-'+exId);
  c.innerHTML = '';
  last.sets.forEach(function(s,i){ appendSetRow(c, exId, i, {w:s.w, r:s.r, done:false}); });
  showToast('✅ تم تحميل آخر جلسة');
}

function addSet(exId){
  var c = document.getElementById('sets-'+exId);
  var idx = c.children.length;
  appendSetRow(c, exId, idx, {w:'',r:'',done:false});
  // Scroll the new row into view
  setTimeout(function(){
    var newRow = document.getElementById('set-'+exId+'-'+idx);
    if(newRow) newRow.scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);
}

function saveExercise(exId){
  var c = document.getElementById('sets-'+exId);
  var sets = [];
  c.querySelectorAll('.set-row').forEach(function(row,i){
    var wEl = document.getElementById('w-'+exId+'-'+i);
    var rEl = document.getElementById('r-'+exId+'-'+i);
    var doneEl = document.getElementById('done-'+exId+'-'+i);
    var w = parseFloat(wEl ? wEl.value : 0) || 0;
    var r = parseInt(rEl ? rEl.value : 0) || 0;
    var done = doneEl ? doneEl.classList.contains('done') : false;
    if(w || r) sets.push({w:w, r:r, done:done});
  });
  if(!sets.length){ showToast('⚠️ أدخل الوزن والتكرار أول'); return; }
  if(!logs[exId]) logs[exId] = [];
  var ei = logs[exId].findIndex(function(s){ return s.date===today(); });
  if(ei >= 0) logs[exId][ei].sets = sets;
  else logs[exId].push({date:today(), sets:sets});
  saveLogs();

  // PR check
  var all = logs[exId];
  var cur = bestSet(sets);
  var prev = all.slice(0,-1).map(function(s){ return bestSet(s.sets); }).filter(Boolean);
  var isPR = prev.length>0 && cur && prev.every(function(p){ return (cur.w*cur.r)>=(p.w*p.r); });

  showToast(isPR ? '🏆 رقم قياسي جديد!' : '✅ تم الحفظ!');

  var statusEl = document.getElementById('status-'+exId);
  if(statusEl) statusEl.classList.add('show');

  renderHome();
}

function goHome(){
  activeExId = null;
  document.getElementById('floating-save-bar').classList.remove('visible');
  switchView('home', document.querySelector('.nav-btn'));
  renderHome();
}

// ════════════════════════════════
// PROGRESS
// ════════════════════════════════
var currentProgTab = 'history';

function switchProgTab(tab, btn){
  currentProgTab = tab;
  document.querySelectorAll('.ptab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  var histEl = document.getElementById('prog-list');
  var chartEl = document.getElementById('charts-container');
  var searchEl = document.getElementById('prog-search-wrap');
  if(tab==='history'){
    histEl.style.display='flex'; chartEl.style.display='none'; searchEl.style.display='block';
    renderProgress();
  } else {
    histEl.style.display='none'; chartEl.style.display='flex'; searchEl.style.display='none';
    renderCharts();
  }
}

var editModeCards = {};

function renderProgress(){
  var query = (document.getElementById('prog-search') ? document.getElementById('prog-search').value : '').toLowerCase();
  var list = document.getElementById('prog-list');
  var allExs = allExercises();
  list.innerHTML = '';
  var ids = Object.keys(logs).filter(function(id){ return logs[id] && logs[id].length && allExs[id]; });
  var filtered = ids.filter(function(id){ return !query || allExs[id].name.toLowerCase().indexOf(query)!==-1 || allExs[id].muscle.indexOf(query)!==-1; });
  if(!filtered.length){
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>ما في تسجيلات بعد.<br>ابدأ تتمرن وسجل أوزانك!</p></div>';
    return;
  }
  filtered.forEach(function(id){
    var ex = allExs[id];
    var sessions = logs[id];
    var overallBest = null;
    sessions.forEach(function(s){ var b = bestSet(s.sets); if(b && (!overallBest || (b.w*b.r)>(overallBest.w*overallBest.r))) overallBest=b; });
    var isEditing = editModeCards[id] || false;
    var card = document.createElement('div');
    card.className = 'prog-card';
    card.innerHTML =
      '<div class="prog-card-header" onclick="this.closest(\'.prog-card\').classList.toggle(\'open\')">' +
        '<div style="flex:1"><div class="prog-ex-name">'+ex.name+'</div><div class="prog-sessions">'+sessions.length+' جلسة • '+ex.muscle+'</div></div>' +
        '<button class="prog-edit-toggle '+(isEditing?'active':'')+'" onclick="event.stopPropagation();toggleEditMode(\''+id+'\')">'+
          (isEditing?'✓ تم':'✏️ تعديل')+
        '</button>' +
        '<div style="text-align:left;margin-right:8px"><div class="prog-best-val">'+(overallBest?overallBest.w+'كج':'—')+'</div><div class="prog-best-label">'+(overallBest?'× '+overallBest.r+' تكرار':'')+'</div></div>' +
      '</div>' +
      '<div class="prog-history">' +
        sessions.slice().reverse().map(function(s, revIdx){
          var origIdx = sessions.length - 1 - revIdx;
          var deleteSessionBtn = isEditing ?
            '<div class="hist-delete-session" onclick="confirmDeleteSession(\''+id+'\','+origIdx+',\''+ex.name+'\',\''+s.date+'\')">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>' +
            '</div>' : '';
          var pillsHtml = s.sets.map(function(st, setIdx){
            var pillClass = 'hist-set-pill' + (isEditing?' edit-mode':'');
            var deleteX = isEditing ?
              '<span class="pill-delete" onclick="event.stopPropagation();confirmDeleteSet(\''+id+'\','+origIdx+','+setIdx+',\''+ex.name+'\','+st.w+','+st.r+')">✕</span>' : '';
            return '<span class="'+pillClass+'">'+st.w+'كج × '+st.r + deleteX + '</span>';
          }).join('');
          return '<div class="hist-row">' +
            deleteSessionBtn +
            '<div class="hist-date">'+fmtDate(s.date)+'</div>' +
            '<div class="hist-sets">'+pillsHtml+'</div>' +
          '</div>';
        }).join('') +
      '</div>';
    list.appendChild(card);
  });
}

function toggleEditMode(exId){
  editModeCards[exId] = !editModeCards[exId];
  renderProgress();
}

// ════════════════════════════════
// DELETE CONFIRM SYSTEM
// ════════════════════════════════
var pendingDelete = null;

function confirmDeleteSession(exId, sessionIdx, exName, date){
  pendingDelete = {type:'session', exId:exId, sessionIdx:sessionIdx};
  document.getElementById('confirm-icon').textContent = '🗑️';
  document.getElementById('confirm-title').textContent = 'حذف جلسة كاملة؟';
  document.getElementById('confirm-msg').textContent = 'بتنحذف جلسة "'+exName+'" بتاريخ '+fmtDate(date)+' بكل السيتات. هل أنت متأكد؟';
  document.getElementById('confirm-overlay').classList.add('show');
}

function confirmDeleteSet(exId, sessionIdx, setIdx, exName, w, r){
  pendingDelete = {type:'set', exId:exId, sessionIdx:sessionIdx, setIdx:setIdx};
  document.getElementById('confirm-icon').textContent = '⚠️';
  document.getElementById('confirm-title').textContent = 'حذف ست واحد؟';
  document.getElementById('confirm-msg').textContent = 'بتنحذف الست ('+w+'كج × '+r+') من "'+exName+'". هل أنت متأكد؟';
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm(e){
  if(e && e.target !== document.getElementById('confirm-overlay')) return;
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDelete = null;
}

function execDelete(){
  if(!pendingDelete) return;
  var d = pendingDelete;
  if(d.type === 'session'){
    if(logs[d.exId] && logs[d.exId][d.sessionIdx] !== undefined){
      logs[d.exId].splice(d.sessionIdx, 1);
      if(logs[d.exId].length === 0) delete logs[d.exId];
      saveLogs();
      showToast('🗑️ تم حذف الجلسة');
    }
  } else if(d.type === 'set'){
    if(logs[d.exId] && logs[d.exId][d.sessionIdx]){
      var session = logs[d.exId][d.sessionIdx];
      session.sets.splice(d.setIdx, 1);
      if(session.sets.length === 0){
        logs[d.exId].splice(d.sessionIdx, 1);
        if(logs[d.exId].length === 0) delete logs[d.exId];
      }
      saveLogs();
      showToast('🗑️ تم حذف الست');
    }
  }
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDelete = null;
  renderProgress();
}

function renderCharts(){
  var container = document.getElementById('charts-container');
  container.innerHTML = '';
  // destroy old charts
  Object.values(activeCharts).forEach(function(c){ try{c.destroy();}catch(e){} });
  activeCharts = {};

  var allExs = allExercises();
  var ids = Object.keys(logs).filter(function(id){ return logs[id] && logs[id].length>=2 && allExs[id]; });

  if(!ids.length){
    container.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>تحتاج جلستين على الأقل لكل تمرين عشان يظهر الرسم البياني</p></div>';
    return;
  }

  // Total volume chart (all exercises combined by date)
  var volumeByDate = {};
  Object.keys(logs).forEach(function(id){
    if(!allExs[id]) return;
    (logs[id]||[]).forEach(function(s){
      var vol = s.sets.reduce(function(sum, st){ return sum + (st.w * st.r); }, 0);
      if(!volumeByDate[s.date]) volumeByDate[s.date] = 0;
      volumeByDate[s.date] += vol;
    });
  });
  var volDates = Object.keys(volumeByDate).sort();
  if(volDates.length >= 2){
    var volCard = document.createElement('div');
    volCard.className = 'volume-card';
    volCard.innerHTML =
      '<div class="volume-card-header">' +
        '<div class="volume-title">إجمالي الحجم التدريبي</div>' +
        '<div class="volume-badge">📊 كج × تكرار</div>' +
      '</div>' +
      '<div class="volume-wrap"><canvas id="chart-total-volume"></canvas></div>';
    container.appendChild(volCard);
    setTimeout(function(){
      var ctx = document.getElementById('chart-total-volume');
      if(!ctx) return;
      activeCharts['total-vol'] = new Chart(ctx, {
        type:'bar',
        data:{
          labels: volDates.map(fmtDate),
          datasets:[{
            label:'الحجم الكلي',
            data: volDates.map(function(d){ return volumeByDate[d]; }),
            backgroundColor:'rgba(78,205,196,0.4)',
            borderColor:'#4ecdc4',
            borderWidth:2,
            borderRadius:6,
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{
              backgroundColor:'#1e1e28',borderColor:'#2c2c3e',borderWidth:1,
              titleColor:'#eeeef5',bodyColor:'#4ecdc4',rtl:true,
              callbacks:{label:function(ctx){ return ctx.raw.toLocaleString()+' كج'; }}
            }
          },
          scales:{
            x:{ticks:{color:'#6b6b8a',font:{size:9,family:'Cairo'},maxRotation:30},grid:{color:'rgba(255,255,255,.04)'}},
            y:{ticks:{color:'#6b6b8a',font:{size:10,family:'Cairo'},callback:function(v){return v>=1000?(v/1000).toFixed(1)+'k':v;}},grid:{color:'rgba(255,255,255,.06)'},beginAtZero:true}
          }
        }
      });
    }, 50);
  }

  // Per-exercise weight charts
  ids.forEach(function(id){
    var ex = allExs[id];
    var sessions = logs[id];
    var labels = sessions.map(function(s){ return fmtDate(s.date); });
    var data = sessions.map(function(s){ var b = bestSet(s.sets); return b ? b.w : 0; });
    var maxW = Math.max.apply(null, data);

    var card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML =
      '<div class="chart-card-header">' +
        '<div class="chart-ex-name">'+ex.name+'</div>' +
        '<div class="chart-pr-badge">🏆 '+maxW+'كج</div>' +
      '</div>' +
      '<div class="chart-muscle">'+ex.muscle+'</div>' +
      '<div class="chart-wrap"><canvas id="chart-'+id+'"></canvas></div>';
    container.appendChild(card);

    setTimeout(function(){
      var ctx = document.getElementById('chart-'+id);
      if(!ctx) return;
      activeCharts[id] = new Chart(ctx, {
        type:'line',
        data:{
          labels:labels,
          datasets:[{
            label:'أفضل وزن (كج)',
            data:data,
            borderColor:'#f5a623',
            backgroundColor:'rgba(245,166,35,0.12)',
            borderWidth:2.5,
            pointBackgroundColor:'#f5a623',
            pointRadius:4,
            pointHoverRadius:6,
            tension:0.4,
            fill:true,
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{
              backgroundColor:'#1e1e28',borderColor:'#2c2c3e',borderWidth:1,
              titleColor:'#eeeef5',bodyColor:'#f5a623',rtl:true,
              callbacks:{label:function(ctx){ return ctx.raw+'كج'; }}
            }
          },
          scales:{
            x:{ticks:{color:'#6b6b8a',font:{size:10,family:'Cairo'},maxRotation:30},grid:{color:'rgba(255,255,255,.04)'}},
            y:{ticks:{color:'#6b6b8a',font:{size:10,family:'Cairo'},callback:function(v){return v+'كج';}},grid:{color:'rgba(255,255,255,.06)'},beginAtZero:false}
          }
        }
      });
    }, 50);
  });
}

// ════════════════════════════════
// STATS
// ════════════════════════════════
function renderStats(){
  var grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  var allExs = allExercises();
  var uniqueDays = {};
  Object.values(logs).forEach(function(arr){ arr.forEach(function(s){ uniqueDays[s.date]=true; }); });
  var uniqueDaysCount = Object.keys(uniqueDays).length;
  var totalSessions = Object.values(logs).reduce(function(n,a){ return n+a.length; },0);
  var totalExs = Object.keys(logs).filter(function(k){ return logs[k] && logs[k].length; }).length;

  var prs = [];
  Object.keys(logs).forEach(function(id){
    if(!allExs[id] || !logs[id] || !logs[id].length) return;
    var best = null, bestDate = '';
    logs[id].forEach(function(s){ var b = bestSet(s.sets); if(b && (!best || (b.w*b.r)>(best.w*best.r))){best={w:b.w,r:b.r};bestDate=s.date;} });
    if(best) prs.push({w:best.w, r:best.r, date:bestDate, exId:id});
  });
  prs.sort(function(a,b){ return (b.w*b.r)-(a.w*a.r); });

  // Muscle volume breakdown
  var muscleVol = {};
  Object.keys(logs).forEach(function(id){
    if(!allExs[id]) return;
    var muscle = allExs[id].muscle;
    var vol = (logs[id]||[]).reduce(function(sum,s){ return sum + s.sets.reduce(function(ss,st){ return ss+(st.w*st.r); },0); },0);
    if(!muscleVol[muscle]) muscleVol[muscle] = 0;
    muscleVol[muscle] += vol;
  });
  var maxVol = Math.max.apply(null, Object.values(muscleVol).concat([1]));
  var muscleColors = {'صدر':'#e74c3c','ظهر':'#3498db','كتف':'#9b59b6','ترايسبس':'#e67e22','بايسبس':'#2ecc71','أرجل':'#f1c40f','كور':'#1abc9c','جلوتس':'#e07060'};

  var mvHtml = '';
  if(Object.keys(muscleVol).length){
    mvHtml = '<div class="stat-card"><div class="stat-card-title">💪 الحجم حسب العضلة</div><div class="muscle-volume-grid">';
    Object.keys(muscleVol).sort(function(a,b){ return muscleVol[b]-muscleVol[a]; }).forEach(function(m){
      var pct = Math.round((muscleVol[m]/maxVol)*100);
      var color = '#f5a623';
      Object.keys(muscleColors).forEach(function(k){ if(m.indexOf(k)!==-1) color = muscleColors[k]; });
      mvHtml += '<div class="mv-item"><div class="mv-name">'+m+'</div><div class="mv-bar"><div class="mv-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="mv-val" style="color:'+color+'">'+muscleVol[m].toLocaleString()+'</div></div>';
    });
    mvHtml += '</div></div>';
  }

  grid.innerHTML =
    '<div class="stat-card">' +
      '<div class="stat-card-title">📊 الملخص العام</div>' +
      '<div class="mini-stats">' +
        '<div class="mini-stat"><div class="mini-val">'+uniqueDaysCount+'</div><div class="mini-label">أيام تمرين</div></div>' +
        '<div class="mini-stat"><div class="mini-val">'+totalSessions+'</div><div class="mini-label">إجمالي السجلات</div></div>' +
        '<div class="mini-stat"><div class="mini-val">'+totalExs+'</div><div class="mini-label">تمارين مسجلة</div></div>' +
        '<div class="mini-stat"><div class="mini-val">'+prs.length+'</div><div class="mini-label">أرقام قياسية</div></div>' +
      '</div>' +
    '</div>' +
    mvHtml +
    (prs.length ?
    '<div class="stat-card">' +
      '<div class="stat-card-title">🏆 أفضل الأداءات</div>' +
      prs.slice(0,10).map(function(p){
        return '<div class="pr-row">' +
          '<div><div class="pr-ex">'+(allExs[p.exId] ? allExs[p.exId].name : p.exId)+'</div><div class="pr-date">'+fmtDate(p.date)+'</div></div>' +
          '<div class="pr-val">'+p.w+'كج × '+p.r+'</div>' +
        '</div>';
      }).join('') +
    '</div>'
    : '<div class="empty"><div class="empty-icon">🌱</div><p>ابدأ التسجيل وراح تشوف إحصائياتك هنا</p></div>');
}

// ════════════════════════════════
// VIEW SWITCHER
// ════════════════════════════════
function switchView(id, btn){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  // Hide floating save bar when leaving workout
  if(id !== 'workout'){
    activeExId = null;
    document.getElementById('floating-save-bar').classList.remove('visible');
  }
  if(id==='progress-view'){ currentProgTab='history'; renderProgress(); }
  if(id==='stats') renderStats();
  if(id==='home') renderHome();
}
