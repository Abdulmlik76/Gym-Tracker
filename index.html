<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM">
<meta name="theme-color" content="#0a0a0f">
<title>GYM — عبدالملك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--card:#1e1e28;--border:#2c2c3e;
  --acc:#f5a623;--acc2:#e8503a;--acc3:#4ecdc4;--text:#eeeef5;--muted:#6b6b8a;
  --green:#2ecc71;--red:#e74c3c;
  --top:env(safe-area-inset-top,44px);
  --bot:env(safe-area-inset-bottom,34px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;height:100dvh;padding-top:var(--top)}
.view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;padding-bottom:calc(var(--bot) + 70px)}
.view.active{display:flex}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loading-screen.hide{opacity:0;pointer-events:none}
.loader-icon{font-size:48px;margin-bottom:16px;animation:pulse 1.2s infinite}
.loader-text{font-size:14px;color:var(--muted);font-weight:600}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(10,10,15,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding-bottom:var(--bot);z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 6px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Cairo',sans-serif;transition:color .2s}
.nav-btn.active{color:var(--acc)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-weight:700;letter-spacing:.3px}

.page-header{padding:20px 20px 12px;flex-shrink:0}
.page-header h1{font-size:24px;font-weight:900}
.page-header p{font-size:12px;color:var(--muted);margin-top:2px}

/* HOME */
.home-hero{padding:20px 20px 12px;background:linear-gradient(180deg,rgba(245,166,35,.07) 0%,transparent 100%);flex-shrink:0}
.greeting{font-size:13px;color:var(--muted)}
.hero-name{font-size:26px;font-weight:900;margin-top:2px}
.hero-name span{color:var(--acc)}
.hero-date{font-size:12px;color:var(--muted);margin-top:3px}
.hero-cycle{font-size:11px;color:var(--acc3);margin-top:4px;font-weight:600}
.today-card{margin:12px 20px;padding:16px;background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(245,166,35,.04));border:1.5px solid rgba(245,166,35,.25);border-radius:14px;cursor:pointer;transition:all .15s}
.today-card:active{transform:scale(.98);opacity:.8}
.today-card-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.today-badge{width:44px;height:44px;border-radius:12px;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0}
.today-info{flex:1}
.today-label{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.today-focus{font-size:16px;font-weight:900;margin-top:2px}
.today-arrow{color:var(--acc);font-size:18px}
.today-chips{display:flex;flex-wrap:wrap;gap:5px}
.streak-bar{display:flex;align-items:center;gap:8px;margin:8px 20px 4px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.streak-fire{font-size:20px}
.streak-text{flex:1;font-size:12px;color:var(--muted);font-weight:600}
.streak-num{font-size:18px;font-weight:900;color:var(--acc)}

.plan-overview-title{padding:12px 20px 8px;font-size:14px;font-weight:700;color:var(--muted)}
.days-scroll{flex:1;overflow-y:auto;padding:0 20px 8px;display:flex;flex-direction:column;gap:10px}
.day-tile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .15s}
.day-tile:active{transform:scale(.98);opacity:.8}
.day-tile.current-day{border-color:rgba(245,166,35,.35);background:rgba(245,166,35,.05)}
.day-tile.completed-day{opacity:.6}
.day-tile-top{display:flex;align-items:center;gap:12px}
.day-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
.badge-current{background:rgba(245,166,35,.25);color:var(--acc)}
.badge-done{background:rgba(46,204,113,.2);color:var(--green)}
.badge-pending{background:rgba(107,107,138,.15);color:var(--muted)}
.day-info{flex:1}
.day-name{font-weight:700;font-size:15px}
.day-focus{font-size:12px;color:var(--muted);margin-top:1px}
.day-done-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(46,204,113,.15);color:var(--green);font-weight:700;flex-shrink:0}
.muscle-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600}
.ch-chest{background:rgba(231,76,60,.2);color:#e74c3c}
.ch-back{background:rgba(52,152,219,.2);color:#3498db}
.ch-shoulder{background:rgba(155,89,182,.2);color:#9b59b6}
.ch-tricep{background:rgba(230,126,34,.2);color:#e67e22}
.ch-bicep{background:rgba(46,204,113,.2);color:#2ecc71}
.ch-leg{background:rgba(241,196,15,.2);color:#f1c40f}
.ch-core{background:rgba(26,188,156,.2);color:#1abc9c}
.ch-glute{background:rgba(231,76,60,.2);color:#e07060}

/* WORKOUT FULL SCREEN */
#workout-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
#workout-overlay.active{display:flex}
.wo-header{padding:calc(var(--top) + 8px) 16px 10px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.wo-close{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text)}
.wo-close svg{width:18px;height:18px}
.wo-header-info{flex:1;min-width:0}
.wo-header-title{font-size:15px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.wo-timer{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.2);flex-shrink:0}
.wo-timer-icon{font-size:14px}
.wo-timer-val{font-size:14px;font-weight:900;color:var(--acc3);font-variant-numeric:tabular-nums}

.wo-progress-bar{height:3px;background:var(--s2);flex-shrink:0}
.wo-progress-fill{height:100%;background:var(--acc);transition:width .3s}

.wo-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column}

/* Step indicator */
.wo-step{text-align:center;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:12px}
.wo-step span{color:var(--acc)}

/* Exercise card in workout */
.wo-ex-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.wo-ex-name{font-size:20px;font-weight:900;margin-bottom:2px}
.wo-ex-muscle{font-size:13px;color:var(--muted);margin-bottom:4px}
.wo-ex-target{font-size:12px;color:var(--acc);font-weight:700}

/* Last session banner */
.wo-last{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.12);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.wo-last-title{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.wo-last-pills{display:flex;flex-wrap:wrap;gap:5px}
.wo-last-pill{font-size:11px;padding:3px 9px;border-radius:6px;background:rgba(245,166,35,.1);color:var(--acc);font-weight:600;cursor:pointer;border:1px solid rgba(245,166,35,.15)}
.wo-use-last{width:100%;padding:8px;border-radius:8px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.15);color:var(--acc);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px}

/* Sets */
.wo-sets-header{display:flex;padding:0 4px;margin-bottom:6px}
.wo-sets-header span{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.wo-sh-set{width:32px}.wo-sh-w{flex:1;text-align:center}.wo-sh-r{flex:1;text-align:center}.wo-sh-done{width:44px}
.wo-sets{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.wo-set-row{display:flex;align-items:center;gap:6px}
.wo-set-num{width:28px;height:28px;border-radius:7px;background:rgba(245,166,35,.1);color:var(--acc);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wo-set-inputs{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.wo-set-input{background:var(--s1);border:1.5px solid var(--border);border-radius:9px;padding:10px 6px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;width:100%;text-align:center;-webkit-appearance:none;transition:border-color .2s}
.wo-set-input:focus{border-color:var(--acc);outline:none;background:rgba(245,166,35,.04)}
.wo-set-input::placeholder{color:var(--muted);font-size:11px;font-weight:400}
.wo-set-done{width:44px;height:44px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.wo-set-done.done{background:var(--green);border-color:var(--green);color:#fff}
.wo-set-done svg{width:16px;height:16px}
.wo-add-set{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-bottom:12px}

/* Rest timer */
.wo-rest{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(78,205,196,.06);border:1px solid rgba(78,205,196,.12);border-radius:10px}
.wo-rest.ticking{animation:timerPulse 1s infinite alternate}
@keyframes timerPulse{from{border-color:rgba(78,205,196,.12)}to{border-color:rgba(78,205,196,.5)}}
.wo-rest-label{font-size:10px;color:var(--muted);font-weight:600}
.wo-rest-display{flex:1;text-align:center;font-size:18px;font-weight:900;color:var(--acc3)}
.wo-rest-btn{padding:7px 14px;border-radius:8px;background:var(--acc3);border:none;color:#000;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}

/* Navigation */
.wo-nav{padding:12px 16px calc(var(--bot) + 12px);background:var(--s1);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.wo-nav-btn{flex:1;padding:14px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;text-align:center;border:none;transition:all .15s}
.wo-nav-btn:active{transform:scale(.97)}
.wo-prev{background:var(--card);border:1px solid var(--border);color:var(--text)}
.wo-next{background:linear-gradient(135deg,var(--acc),#e0941a);color:#000;box-shadow:0 4px 16px rgba(245,166,35,.3)}
.wo-finish{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff;box-shadow:0 4px 16px rgba(46,204,113,.3)}

/* Edit mode overlay */
#edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:400;display:none;flex-direction:column}
#edit-overlay.active{display:flex}
.edit-header{padding:calc(var(--top) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.edit-title{flex:1;font-size:18px;font-weight:900}
.edit-close{padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.edit-list{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;gap:8px}
.edit-ex-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}
.edit-ex-item:active{transform:scale(.98)}
.edit-ex-item.selected{border-color:var(--acc);background:rgba(245,166,35,.06)}
.edit-ex-name{font-weight:700;font-size:14px}
.edit-ex-muscle{font-size:11px;color:var(--muted);margin-top:2px}

/* Replacement list */
#replace-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:450;display:none;flex-direction:column}
#replace-overlay.active{display:flex}
.replace-header{padding:calc(var(--top) + 12px) 16px 12px;flex-shrink:0}
.replace-title{font-size:16px;font-weight:900;margin-bottom:2px}
.replace-sub{font-size:12px;color:var(--muted)}
.replace-list{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;gap:8px}
.replace-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}
.replace-item:active{transform:scale(.98);background:rgba(245,166,35,.06)}
.replace-item-name{font-weight:700;font-size:14px}
.replace-item-detail{font-size:11px;color:var(--muted);margin-top:2px}
.replace-cancel{margin:0 16px 20px;padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;flex-shrink:0;margin-bottom:calc(var(--bot) + 16px)}

/* PROGRESS */
.prog-tabs{display:flex;gap:8px;padding:0 20px 14px;flex-shrink:0}
.ptab{flex:1;padding:9px;text-align:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--card)}
.ptab.active{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}

/* Weight input */
.weight-input-wrap{padding:0 20px 14px;flex-shrink:0}
.weight-input-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.weight-input-label{font-size:13px;font-weight:700;flex-shrink:0}
.weight-input-label span{font-size:16px}
.weight-input{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;text-align:center;-webkit-appearance:none;max-width:120px}
.weight-input:focus{border-color:var(--acc);outline:none}
.weight-input::placeholder{color:var(--muted);font-size:12px;font-weight:400}
.weight-unit{font-size:12px;color:var(--muted);font-weight:600}
.weight-save-btn{padding:8px 16px;border-radius:8px;background:var(--acc);border:none;color:#000;font-family:'Cairo',sans-serif;font-size:12px;font-weight:900;cursor:pointer}
.weight-history-peek{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}

.prog-search{padding:0 20px 12px;flex-shrink:0}
.search-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;-webkit-appearance:none}
.search-input:focus{border-color:var(--acc);outline:none}
.search-input::placeholder{color:var(--muted)}
.prog-list{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:12px}

.prog-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.prog-card-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.prog-ex-name{font-weight:700;font-size:14px}
.prog-sessions{font-size:11px;color:var(--muted);margin-top:2px}
.prog-best-val{font-size:20px;font-weight:900;color:var(--acc);text-align:left}
.prog-best-label{font-size:10px;color:var(--muted);text-align:left}
.prog-history{display:none;padding:0 16px 14px}
.prog-card.open .prog-history{display:block}
.hist-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--muted);width:70px;flex-shrink:0;padding-top:3px}
.hist-sets{flex:1;display:flex;flex-wrap:wrap;gap:5px}
.hist-set-pill{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;position:relative}
.hist-delete-session{width:30px;height:30px;border-radius:8px;border:1px solid rgba(231,76,60,.2);background:rgba(231,76,60,.08);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hist-delete-session svg{width:14px;height:14px}
.hist-set-pill .pill-delete{display:none;position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:900;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;z-index:2}
.hist-set-pill.edit-mode .pill-delete{display:flex}
.hist-set-pill.edit-mode{border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.06)}
.prog-edit-toggle{font-size:10px;padding:4px 10px;border-radius:8px;background:rgba(107,107,138,.1);border:1px solid var(--border);color:var(--muted);font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;flex-shrink:0}
.prog-edit-toggle.active{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.08)}

/* Charts */
.charts-container{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:14px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;overflow:hidden}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.chart-ex-name{font-weight:700;font-size:14px}
.chart-pr-badge{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(245,166,35,.15);color:var(--acc);font-weight:700}
.chart-muscle{font-size:11px;color:var(--muted);margin-bottom:12px}
.chart-wrap{position:relative;height:160px}
.volume-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;overflow:hidden}
.volume-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.volume-title{font-weight:700;font-size:14px}
.volume-badge{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(78,205,196,.15);color:var(--acc3);font-weight:700}
.volume-wrap{position:relative;height:180px}

/* SETTINGS */
#settings-view{background:var(--bg)}
.settings-list{padding:0 16px 20px;display:flex;flex-direction:column;gap:10px}
.setting-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.setting-card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.setting-card-title span{font-size:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:600}
.setting-sublabel{font-size:11px;color:var(--muted);margin-top:2px}
.setting-value{font-size:13px;color:var(--acc);font-weight:700;text-align:left}
.setting-btn{padding:8px 16px;border-radius:8px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--acc);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.setting-btn:active{opacity:.7}
.setting-btn.danger{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.2);color:var(--red)}

.plan-option{display:flex;gap:8px;margin-top:8px}
.plan-btn{flex:1;padding:12px 8px;border-radius:10px;background:var(--s1);border:2px solid var(--border);color:var(--muted);font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;text-align:center;transition:all .2s}
.plan-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(245,166,35,.08)}

/* Confirm modal */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;max-width:320px;width:100%;text-align:center;animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:900;margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:12px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.confirm-delete{flex:1;padding:12px;border-radius:10px;background:var(--red);border:none;color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(231,76,60,.3)}

.toast{position:fixed;bottom:calc(72px + var(--bot) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.7}
::-webkit-scrollbar{display:none}

input[type=file]{display:none}

    ]
  };
  return plans[days] || plans[6];
}

function buildPlanDays(planDays){
  var plan = getPlan(planDays);
  var custom = settings.customPlan && settings.customPlan[planDays];
  return plan.map(function(day, di){
    var exercises = day.template.map(function(t){
      var grp = EXERCISE_DB[t.g];
      var idx = Math.min(t.i, grp.exercises.length - 1);
      return JSON.parse(JSON.stringify(grp.exercises[idx]));
    });
    // Apply custom modifications
    if(custom && custom[di]){
      if(custom[di].added) custom[di].added.forEach(function(ex){exercises.push(ex);});
      if(custom[di].removed) exercises = exercises.filter(function(e){return custom[di].removed.indexOf(e.id)===-1;});
      if(custom[di].swapped){
        custom[di].swapped.forEach(function(sw){
          var idx = exercises.findIndex(function(e){return e.id === sw.from;});
          if(idx !== -1){
            var newEx = getExById(sw.to);
            exercises[idx] = JSON.parse(JSON.stringify(newEx));
          }
        });
      }
    }
    return {
      name: day.name,
      focus: day.focus,
      chips: day.chips,
      labels: day.labels,
      exercises: exercises
    };
  });
}

function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){var p=d.split('-');var months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return parseInt(p[2])+' '+months[parseInt(p[1])-1];}
function fmtDateShort(d){var p=d.split('-');return parseInt(p[2])+'/'+(parseInt(p[1]));}
function bestSet(s){if(!s||!s.length)return null;return s.reduce(function(b,x){return(x.w*x.r)>(b.w*b.r)?x:b;},s[0]);}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function getLastSession(exId){var sessions=logs[exId]||[];if(!sessions.length)return null;return sessions[sessions.length-1];}

function getStreak(){
  var dates={};Object.values(logs).forEach(function(a){a.forEach(function(s){dates[s.date]=true;});});
  var streak=0;var d=new Date();d.setHours(0,0,0,0);
  if(dates[d.toISOString().split('T')[0]])streak++;
  d.setDate(d.getDate()-1);
  while(dates[d.toISOString().split('T')[0]]){streak++;d.setDate(d.getDate()-1);}
  return streak;
}

function isDayCompleted(dayIdx){
  return settings.completedDays && settings.completedDays.indexOf(dayIdx) !== -1;
}

function getCurrentDayIdx(){
  return settings.currentDayIdx || 0;
}

function allExercisesMap(){
  var m = {};
  Object.keys(EXERCISE_DB).forEach(function(g){
    EXERCISE_DB[g].exercises.forEach(function(e){m[e.id]=e;});
  });
  // Also include exercises from current plan (custom ones)
  var days = buildPlanDays(settings.planDays || 6);
  days.forEach(function(d){d.exercises.forEach(function(e){m[e.id]=e;});});
  return m;
}

async function initStorage(){
  try{localStorage.setItem('gym_probe','ok');if(localStorage.getItem('gym_probe')==='ok')localStorageOk=true;}catch(e){}
  if(window.storage){try{await window.storage.set('gym_probe','ok');var p=await window.storage.get('gym_probe');if(p&&p.value==='ok')storageAvailable=true;}catch(e){}}

  var loaded=false;
  if(storageAvailable){
    try{var r=await window.storage.get('gym_data_v4');if(r&&r.value){var d=JSON.parse(r.value);logs=d.logs||{};settings=d.settings||{};loaded=true;}}catch(e){}
  }
  if(!loaded&&localStorageOk){
    try{var l=localStorage.getItem('gym_data_v4');if(l){var d=JSON.parse(l);logs=d.logs||{};settings=d.settings||{};loaded=true;}}catch(e){}
  }
  // Migrate from v3
  if(!loaded&&localStorageOk){
    try{var l3=localStorage.getItem('gym_data_v3');if(l3){var d=JSON.parse(l3);logs=d.logs||{};settings=d.settings||{};loaded=true;}}catch(e){}
  }
  // Migrate from v2
  if(!loaded&&localStorageOk){
    try{var old=localStorage.getItem('gym_logs_v2');if(old){logs=JSON.parse(old);}}catch(e){}
  }

  // Defaults
  if(!settings.planDays) settings.planDays = 6;
  if(settings.currentDayIdx === undefined) settings.currentDayIdx = 0;
  if(!settings.completedDays) settings.completedDays = [];
  if(!settings.customPlan) settings.customPlan = {};
  if(!settings.weightLog) settings.weightLog = [];
  if(!settings.gymSessions) settings.gymSessions = [];

  await saveAll();
  document.getElementById('loading-screen').classList.add('hide');
  setTimeout(function(){document.getElementById('loading-screen').style.display='none';},400);
  renderHome();
}

async function saveAll(){
  var data=JSON.stringify({logs:logs,settings:settings});
  if(localStorageOk){try{localStorage.setItem('gym_data_v4',data);}catch(e){}}
  if(storageAvailable){try{await window.storage.set('gym_data_v4',data);}catch(e){}}
}

function getStorageLabel(){
  if(storageAvailable)return '☁️ دائم (Cloud)';
  if(localStorageOk)return '💾 دائم (محلي)';
  return '⚠️ مؤقت (ذاكرة فقط)';
}

function startWorkout(dayIdx){
  var days = buildPlanDays(settings.planDays || 6);
  var day = days[dayIdx];
  woState = {
    dayIdx: dayIdx,
    day: day,
    exIdx: 0,
    date: today(),
    sets: {}, // exId -> [{w,r,done}]
    firstSetTime: null,
    finished: false
  };

  // Pre-fill sets from today's logs or last session
  day.exercises.forEach(function(ex){
    var todayLog = (logs[ex.id]||[]).find(function(s){return s.date === woState.date;});
    if(todayLog){
      woState.sets[ex.id] = todayLog.sets.map(function(s){return{w:s.w,r:s.r,done:s.done};});
    } else {
      var last = getLastSession(ex.id);
      if(last) woState.sets[ex.id] = last.sets.map(function(s){return{w:s.w,r:s.r,done:false};});
      else woState.sets[ex.id] = [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}];
    }
  });

  document.getElementById('wo-title').textContent = day.focus;
  document.getElementById('wo-sub').textContent = day.exercises.length + ' تمارين • يوم ' + (dayIdx+1);
  document.getElementById('workout-overlay').classList.add('active');

  // Reset gym timer
  gymStartTime = null;
  if(gymTimerId){clearInterval(gymTimerId);gymTimerId=null;}
  document.getElementById('wo-gym-timer').style.display='none';

  renderWorkoutStep();
}

function renderWorkoutStep(){
  if(!woState) return;
  var ex = woState.day.exercises[woState.exIdx];
  var total = woState.day.exercises.length;
  var idx = woState.exIdx;
  var sets = woState.sets[ex.id] || [];

  // Progress bar
  document.getElementById('wo-progress').style.width = ((idx+1)/total*100)+'%';

  // Body
  var body = document.getElementById('wo-body');
  var html = '';

  // Step indicator
  html += '<div class="wo-step">تمرين <span>'+(idx+1)+'</span> من <span>'+total+'</span></div>';

  // Exercise card
  html += '<div class="wo-ex-card">';
  html += '<div class="wo-ex-name">'+ex.name+'</div>';
  html += '<div class="wo-ex-muscle">'+ex.muscle+'</div>';
  html += '<div class="wo-ex-target">الهدف: '+ex.target+'</div>';
  html += '</div>';

  // Last session banner
  var last = getLastSession(ex.id);
  if(last && last.date !== woState.date){
    html += '<div class="wo-last"><div class="wo-last-title">آخر جلسة — '+fmtDate(last.date)+'</div>';
    html += '<div class="wo-last-pills">'+last.sets.map(function(s,i){
      return '<span class="wo-last-pill" onclick="woFillSet(\''+ex.id+'\','+i+','+s.w+','+s.r+')">'+s.w+'كج × '+s.r+'</span>';
    }).join('')+'</div>';
    var todayLog = (logs[ex.id]||[]).find(function(s){return s.date === woState.date;});
    if(!todayLog) html += '<button class="wo-use-last" onclick="woUseLastSession(\''+ex.id+'\')">↩ استخدم نفس الأوزان</button>';
    html += '</div>';
  }

  // Sets header
  html += '<div class="wo-sets-header"><span class="wo-sh-set">ست</span><span class="wo-sh-w">الوزن (كج)</span><span class="wo-sh-r">التكرار</span><span class="wo-sh-done"></span></div>';

  // Sets
  html += '<div class="wo-sets" id="wo-sets">';
  sets.forEach(function(s,i){
    html += '<div class="wo-set-row">';
    html += '<div class="wo-set-num">'+(i+1)+'</div>';
    html += '<div class="wo-set-inputs">';
    html += '<input class="wo-set-input" type="number" inputmode="decimal" placeholder="كج" value="'+(s.w||'')+'" id="wo-w-'+i+'" onchange="woUpdateSet('+i+')">';
    html += '<input class="wo-set-input" type="number" inputmode="numeric" placeholder="تكرار" value="'+(s.r||'')+'" id="wo-r-'+i+'" onchange="woUpdateSet('+i+')">';
    html += '</div>';
    html += '<button class="wo-set-done '+(s.done?'done':'')+'" onclick="woToggleDone('+i+')" id="wo-done-'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>';
    html += '</div>';
  });
  html += '</div>';

  // Add set button
  html += '<button class="wo-add-set" onclick="woAddSet()">+ إضافة ست</button>';

  // Rest timer
  html += '<div class="wo-rest" id="wo-rest"><div class="wo-rest-label">راحة</div><div class="wo-rest-display" id="wo-rest-display">1:30</div><button class="wo-rest-btn" onclick="woStartRest(90)">⏱ ابدأ</button></div>';

  body.innerHTML = html;

  // Navigation
  var nav = document.getElementById('wo-nav');
  var navHtml = '';
  if(idx > 0) navHtml += '<button class="wo-nav-btn wo-prev" onclick="woPrev()">→ السابق</button>';
  if(idx < total - 1){
    navHtml += '<button class="wo-nav-btn wo-next" onclick="woSaveAndNext()">التالي ←</button>';
  } else {
    navHtml += '<button class="wo-nav-btn wo-finish" onclick="woFinish()">إنهاء التمرين ✓</button>';
  }
  // Edit button
  navHtml += '<button class="wo-nav-btn wo-prev" onclick="openEditMode()" style="flex:0;padding:14px 16px">✏️</button>';
  nav.innerHTML = navHtml;
}

function woUpdateSet(i){
  if(!woState) return;
  var ex = woState.day.exercises[woState.exIdx];
  var sets = woState.sets[ex.id];
  var wEl = document.getElementById('wo-w-'+i);
  var rEl = document.getElementById('wo-r-'+i);
  if(sets[i]){
    sets[i].w = parseFloat(wEl.value) || 0;
    sets[i].r = parseInt(rEl.value) || 0;
  }
}

function woToggleDone(i){
  if(!woState) return;
  var ex = woState.day.exercises[woState.exIdx];
  var sets = woState.sets[ex.id];
  if(!sets[i]) return;

  // Read current input values first
  var wEl = document.getElementById('wo-w-'+i);
  var rEl = document.getElementById('wo-r-'+i);
  if(wEl) sets[i].w = parseFloat(wEl.value) || 0;
  if(rEl) sets[i].r = parseInt(rEl.value) || 0;

  sets[i].done = !sets[i].done;
  var btn = document.getElementById('wo-done-'+i);
  if(btn) btn.classList.toggle('done', sets[i].done);

  // Start gym timer on first done
  if(sets[i].done && !gymStartTime){
    gymStartTime = Date.now();
    document.getElementById('wo-gym-timer').style.display='flex';
    gymTimerId = setInterval(updateGymTimer, 1000);
    updateGymTimer();
  }

  // Auto-save this exercise
  woSaveCurrentEx();
}

function woSaveCurrentEx(){
  if(!woState) return;
  var ex = woState.day.exercises[woState.exIdx];
  var sets = woState.sets[ex.id] || [];

  // Read all input values
  sets.forEach(function(s,i){
    var wEl = document.getElementById('wo-w-'+i);
    var rEl = document.getElementById('wo-r-'+i);
    if(wEl) s.w = parseFloat(wEl.value) || s.w || 0;
    if(rEl) s.r = parseInt(rEl.value) || s.r || 0;
  });

  var validSets = sets.filter(function(s){return s.w || s.r;});
  if(!validSets.length) return;

  if(!logs[ex.id]) logs[ex.id] = [];
  var ei = logs[ex.id].findIndex(function(s){return s.date === woState.date;});
  if(ei >= 0) logs[ex.id][ei].sets = validSets;
  else logs[ex.id].push({date: woState.date, sets: validSets});
  saveAll();
}

function woAddSet(){
  if(!woState) return;
  var ex = woState.day.exercises[woState.exIdx];
  woState.sets[ex.id].push({w:'',r:'',done:false});
  renderWorkoutStep();
  setTimeout(function(){
    var sets = document.querySelectorAll('#wo-sets .wo-set-row');
    if(sets.length) sets[sets.length-1].scrollIntoView({behavior:'smooth',block:'center'});
  },50);
}

function woFillSet(exId,i,w,r){
  if(!woState) return;
  var sets = woState.sets[exId];
  if(sets[i]){sets[i].w=w;sets[i].r=r;}
  var wEl=document.getElementById('wo-w-'+i);var rEl=document.getElementById('wo-r-'+i);
  if(wEl)wEl.value=w;if(rEl)rEl.value=r;
}

function woUseLastSession(exId){
  if(!woState) return;
  var last = getLastSession(exId);
  if(!last) return;
  woState.sets[exId] = last.sets.map(function(s){return{w:s.w,r:s.r,done:false};});
  renderWorkoutStep();
  showToast('✅ تم تحميل آخر جلسة');
}

function woPrev(){
  if(!woState || woState.exIdx <= 0) return;
  woSaveCurrentEx();
  woState.exIdx--;
  renderWorkoutStep();
}

function woSaveAndNext(){
  if(!woState) return;
  woSaveCurrentEx();
  if(woState.exIdx < woState.day.exercises.length - 1){
    woState.exIdx++;
    renderWorkoutStep();
  }
}

function woFinish(){
  if(!woState) return;
  woSaveCurrentEx();

  // Save all exercises
  woState.day.exercises.forEach(function(ex, i){
    var sets = woState.sets[ex.id] || [];
    var validSets = sets.filter(function(s){return s.w || s.r;});
    if(!validSets.length) return;
    if(!logs[ex.id]) logs[ex.id] = [];
    var ei = logs[ex.id].findIndex(function(s){return s.date === woState.date;});
    if(ei >= 0) logs[ex.id][ei].sets = validSets;
    else logs[ex.id].push({date: woState.date, sets: validSets});
  });

  // Stop gym timer
  var elapsed = 0;
  if(gymStartTime){
    elapsed = Math.floor((Date.now() - gymStartTime) / 1000);
    if(gymTimerId){clearInterval(gymTimerId);gymTimerId=null;}
  }

  // Save gym session
  if(elapsed > 0){
    if(!settings.gymSessions) settings.gymSessions = [];
    settings.gymSessions.push({date: woState.date, dayIdx: woState.dayIdx, duration: elapsed});
  }

  // Mark day as completed and advance
  var dayIdx = woState.dayIdx;
  if(!settings.completedDays) settings.completedDays = [];
  if(settings.completedDays.indexOf(dayIdx) === -1){
    settings.completedDays.push(dayIdx);
  }

  // Advance to next day
  var planDays = settings.planDays || 6;
  var nextDay = (dayIdx + 1) % planDays;

  // If all days completed, reset cycle
  if(settings.completedDays.length >= planDays){
    settings.completedDays = [];
    settings.currentDayIdx = 0;
  } else {
    settings.currentDayIdx = nextDay;
  }

  saveAll();

  var timeStr = '';
  if(elapsed > 0){
    var m = Math.floor(elapsed/60);
    var s = elapsed%60;
    timeStr = '\nالوقت: '+m+' دقيقة';
  }
  showToast('🎉 أحسنت! تم إنهاء التمرين'+timeStr);
  closeWorkout();
  renderHome();
}

function closeWorkout(){
  // Save current exercise data before closing
  if(woState) woSaveCurrentEx();

  document.getElementById('workout-overlay').classList.remove('active');
  if(gymTimerId){clearInterval(gymTimerId);gymTimerId=null;}
  if(restTimerId){clearInterval(restTimerId);restTimerId=null;}
  woState = null;
  gymStartTime = null;
}

// Gym timer
function updateGymTimer(){
  if(!gymStartTime) return;
  var elapsed = Math.floor((Date.now() - gymStartTime) / 1000);
  var m = Math.floor(elapsed/60);
  var s = elapsed%60;
  document.getElementById('wo-gym-timer-val').textContent = m+':'+(s<10?'0':'')+s;
}

// Rest timer
function woStartRest(secs){
  if(restTimerId){clearInterval(restTimerId);restTimerId=null;}
  var display = document.getElementById('wo-rest-display');
  var bar = document.getElementById('wo-rest');
  var remaining = secs;
  bar.classList.add('ticking');
  function tick(){
    var m=Math.floor(remaining/60);var s=remaining%60;
    display.textContent=m+':'+(s<10?'0':'')+s;
    if(remaining<=0){clearInterval(restTimerId);restTimerId=null;bar.classList.remove('ticking');display.textContent='✅ يلا!';setTimeout(function(){display.textContent='1:30';},3000);}
    remaining--;
  }
  tick();restTimerId=setInterval(tick,1000);
}

function openEditMode(){
  if(!woState) return;
  var list = document.getElementById('edit-list');
  list.innerHTML = '';
  woState.day.exercises.forEach(function(ex, i){
    var item = document.createElement('div');
    item.className = 'edit-ex-item' + (i === woState.exIdx ? ' selected' : '');
    item.innerHTML = '<div class="edit-ex-name">'+ex.name+'</div><div class="edit-ex-muscle">'+ex.muscle+' • '+ex.target+'</div>';
    (function(exObj, idx){
      item.onclick = function(){openReplaceMode(exObj, idx);};
    })(ex, i);
    list.appendChild(item);
  });
  document.getElementById('edit-overlay').classList.add('active');
}

function closeEditMode(){
  document.getElementById('edit-overlay').classList.remove('active');
}

function openReplaceMode(ex, exIdx){
  var group = getExGroup(ex.id);
  var title = document.getElementById('replace-title');
  var sub = document.getElementById('replace-sub');
  title.textContent = 'بدائل لـ ' + ex.name;

  if(!group){
    sub.textContent = 'لم يتم العثور على بدائل';
    document.getElementById('replace-list').innerHTML = '<div class="empty"><p>لا توجد بدائل متاحة</p></div>';
    document.getElementById('replace-overlay').classList.add('active');
    return;
  }

  sub.textContent = EXERCISE_DB[group].label + ' — اختر تمرين بديل';
  var list = document.getElementById('replace-list');
  list.innerHTML = '';

  // Get current exercise IDs to exclude
  var currentIds = woState.day.exercises.map(function(e){return e.id;});

  EXERCISE_DB[group].exercises.forEach(function(alt){
    if(alt.id === ex.id) return; // skip current
    if(currentIds.indexOf(alt.id) !== -1) return; // skip already in workout

    var item = document.createElement('div');
    item.className = 'replace-item';
    item.innerHTML = '<div class="replace-item-name">'+alt.name+'</div><div class="replace-item-detail">'+alt.muscle+' • '+alt.target+'</div>';
    (function(altEx){
      item.onclick = function(){swapExercise(ex, altEx, exIdx);};
    })(alt);
    list.appendChild(item);
  });

  document.getElementById('replace-overlay').classList.add('active');
}

function closeReplaceMode(){
  document.getElementById('replace-overlay').classList.remove('active');
}

function swapExercise(oldEx, newEx, exIdx){
  if(!woState) return;

  // Update the day's exercises
  woState.day.exercises[exIdx] = JSON.parse(JSON.stringify(newEx));

  // Initialize sets for new exercise
  var last = getLastSession(newEx.id);
  if(last) woState.sets[newEx.id] = last.sets.map(function(s){return{w:s.w,r:s.r,done:false};});
  else woState.sets[newEx.id] = [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}];

  // Save swap to custom plan
  var planDays = settings.planDays || 6;
  if(!settings.customPlan) settings.customPlan = {};
  if(!settings.customPlan[planDays]) settings.customPlan[planDays] = {};
  if(!settings.customPlan[planDays][woState.dayIdx]) settings.customPlan[planDays][woState.dayIdx] = {added:[],removed:[],swapped:[]};
  var cp = settings.customPlan[planDays][woState.dayIdx];
  if(!cp.swapped) cp.swapped = [];
  // Remove any existing swap for this position
  cp.swapped = cp.swapped.filter(function(s){return s.from !== oldEx.id;});
  cp.swapped.push({from: oldEx.id, to: newEx.id});
  saveAll();

  closeReplaceMode();
  closeEditMode();

  // Jump to the swapped exercise
  woState.exIdx = exIdx;
  renderWorkoutStep();
  showToast('✅ تم استبدال التمرين');
}

function saveWeight(){
  var input = document.getElementById('weight-input');
  var w = parseFloat(input.value);
  if(!w || w <= 0){showToast('⚠️ أدخل وزن صحيح');return;}
  if(!settings.weightLog) settings.weightLog = [];
  var d = today();
  var existing = settings.weightLog.findIndex(function(e){return e.date === d;});
  if(existing >= 0) settings.weightLog[existing].weight = w;
  else settings.weightLog.push({date: d, weight: w});
  saveAll();
  input.value = '';
  updateWeightPeek();
  showToast('✅ تم حفظ الوزن: '+w+' كج');
}

function updateWeightPeek(){
  var peek = document.getElementById('weight-peek');
  if(!settings.weightLog || !settings.weightLog.length){peek.textContent='';return;}
  var recent = settings.weightLog.slice(-3).reverse();
  peek.textContent = recent.map(function(e){return fmtDateShort(e.date)+': '+e.weight+'كج';}).join(' • ');

  // Pre-fill today's weight if exists
  var todayW = settings.weightLog.find(function(e){return e.date === today();});
  if(todayW) document.getElementById('weight-input').placeholder = todayW.weight + ' كج (محفوظ)';
}

function exportData(){
  var data = {
    version: 'gym_v4',
    exportDate: today(),
    logs: logs,
    settings: settings
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'gym_backup_'+today()+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 تم تصدير البيانات');
}

function importData(){
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(data.logs){
          // Merge logs: keep existing, add new
          Object.keys(data.logs).forEach(function(id){
            if(!logs[id]) logs[id] = [];
            data.logs[id].forEach(function(session){
              var exists = logs[id].some(function(s){return s.date === session.date;});
              if(!exists) logs[id].push(session);
            });
            // Sort by date
            logs[id].sort(function(a,b){return a.date.localeCompare(b.date);});
          });
        }
        if(data.settings){
          // Import settings selectively
          if(data.settings.weightLog){
            if(!settings.weightLog) settings.weightLog = [];
            data.settings.weightLog.forEach(function(w){
              var exists = settings.weightLog.some(function(e){return e.date === w.date;});
              if(!exists) settings.weightLog.push(w);
            });
            settings.weightLog.sort(function(a,b){return a.date.localeCompare(b.date);});
          }
          if(data.settings.gymSessions){
            if(!settings.gymSessions) settings.gymSessions = [];
            data.settings.gymSessions.forEach(function(s){
              var exists = settings.gymSessions.some(function(e){return e.date === s.date && e.dayIdx === s.dayIdx;});
              if(!exists) settings.gymSessions.push(s);
            });
          }
          if(data.settings.planDays) settings.planDays = data.settings.planDays;
          if(data.settings.currentDayIdx !== undefined) settings.currentDayIdx = data.settings.currentDayIdx;
          if(data.settings.completedDays) settings.completedDays = data.settings.completedDays;
          if(data.settings.customPlan) settings.customPlan = data.settings.customPlan;
        }
        saveAll();
        renderHome();
        renderSettings();
        showToast('📤 تم استيراد البيانات بنجاح!');
      }catch(err){
        showToast('⚠️ خطأ في الملف');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

  pendingDelete={type:'clearAll'};
  document.getElementById('confirm-icon').textContent='⚠️';
  document.getElementById('confirm-title').textContent='مسح كل البيانات؟';
  document.getElementById('confirm-msg').textContent='بتنمسح كل السجلات والإعدادات نهائياً. هل أنت متأكد؟';
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(e){
  if(e && e.target !== document.getElementById('confirm-overlay')) return;
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDelete=null;
}
function execDelete(){
  if(!pendingDelete) return;
  var d=pendingDelete;
  if(d.type==='clearAll'){
    logs={};
    settings={planDays:6,currentDayIdx:0,completedDays:[],customPlan:{},weightLog:[],gymSessions:[]};
    saveAll();document.getElementById('confirm-overlay').classList.remove('show');pendingDelete=null;
    renderHome();renderSettings();showToast('🗑️ تم مسح الكل');return;
  }
  if(d.type==='session'){
    if(logs[d.exId]){logs[d.exId].splice(d.sessionIdx,1);if(!logs[d.exId].length)delete logs[d.exId];saveAll();showToast('🗑️ تم حذف الجلسة');}
  } else if(d.type==='set'){
    if(logs[d.exId]&&logs[d.exId][d.sessionIdx]){
      logs[d.exId][d.sessionIdx].sets.splice(d.setIdx,1);
      if(!logs[d.exId][d.sessionIdx].sets.length){logs[d.exId].splice(d.sessionIdx,1);if(!logs[d.exId].length)delete logs[d.exId];}
      saveAll();showToast('🗑️ تم حذف الست');
    }
  }
  document.getElementById('confirm-overlay').classList.remove('show');pendingDelete=null;renderProgress();
}

// ============================================
// VIEW SWITCHER
// ============================================
function switchView(id,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  if(id==='progress-view'){currentProgTab='history';renderProgress();}
  if(id==='settings-view')renderSettings();
  if(id==='home')renderHome();
}

// ============================================
// INIT
// ============================================
initStorage();
</script>
